name: Upstream Filter Synchronization

on:
  push:
    paths:
      - 'config/sources.txt'
      - 'scripts/fetch_filters.sh'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Grant execution rights to the script
        run: chmod +x scripts/fetch_filters.sh

      - name: Fetch latest filter lists
        run: ./scripts/fetch_filters.sh

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add filters/
          
          if git diff-index --quiet HEAD --; then
            echo "No upstream changes detected today. Skipping commit."
          else
            git commit -m "chore(filters): synchronize upstream adblock lists" -m "Automated update triggered by GitHub Actions."
            git push
          fi
