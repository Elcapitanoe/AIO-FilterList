name: Upstream Filter Synchronization

on:
  push:
    paths:
      - 'config/sources.txt'
      - 'scripts/*.sh'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync-and-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Grant execution rights to scripts
        run: chmod +x scripts/*.sh

      - name: Fetch latest filter lists
        run: ./scripts/fetch_filters.sh

      - name: Generate AIO merged list
        run: ./scripts/merge_filters.sh

      - name: Update README dynamic table
        run: ./scripts/update_readme.sh

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add filters/ AIO_Filter_List.txt build.log README.md
          
          if git diff-index --quiet HEAD --; then
            echo "No upstream changes detected today. Skipping commit."
          else
            git commit -m "build(core): overhaul automation and inject dynamic README table" -m "Automated routine triggered by GitHub Actions."
            git push
          fi
